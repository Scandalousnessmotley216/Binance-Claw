<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="800" height="160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0b90b"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="160" rx="12" fill="url(#bg)"/>
  <rect width="800" height="160" rx="12" fill="none" stroke="#f0b90b" stroke-width="1.5" opacity="0.3"/>

  <!-- Lightning bolt icon -->
  <text x="42" y="98" font-size="60" text-anchor="middle" filter="url(#glow)" fill="#f0b90b">⚡</text>

  <!-- Title -->
  <text x="90" y="72" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="42" font-weight="700" fill="url(#accent)" filter="url(#glow)">Binance-Claw</text>

  <!-- Subtitle -->
  <text x="91" y="102" font-family="'SF Mono', 'Fira Code', monospace" font-size="16" fill="#8b949e">Lightning-fast crypto price sniper &amp; OpenClaw skill — written in Rust</text>

  <!-- Rust logo badge -->
  <rect x="558" y="115" width="90" height="24" rx="4" fill="#ce422b" opacity="0.85"/>
  <text x="603" y="131" font-family="monospace" font-size="12" font-weight="700" fill="white" text-anchor="middle">⚙ Rust</text>

  <!-- Binance badge -->
  <rect x="658" y="115" width="110" height="24" rx="4" fill="#f0b90b" opacity="0.9"/>
  <text x="713" y="131" font-family="monospace" font-size="12" font-weight="700" fill="#0d1117" text-anchor="middle">◆ Binance</text>

  <!-- Version tag -->
  <rect x="558" y="18" width="210" height="22" rx="4" fill="#21262d"/>
  <text x="663" y="33" font-family="monospace" font-size="11" fill="#58a6ff" text-anchor="middle">v1.0.0 • Windows • Linux • macOS</text>

  <!-- Decorative line -->
  <line x1="90" y1="112" x2="545" y2="112" stroke="#f0b90b" stroke-width="1" opacity="0.2"/>
</svg>
